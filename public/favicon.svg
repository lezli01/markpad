<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <!--
    markpad app icon — the Markdown mark (a blocky "M" beside a downward
    arrow) in white on a flat rounded indigo tile. Flat single-accent fill
    (#6366f1, the app's accent) to match the flat, edge-to-edge redesign —
    no gradient. The glyphs are encoded as SVG paths (not <text>) so resvg /
    `tauri icon` rasterizes them without needing a system font.
  -->
  <rect width="1024" height="1024" rx="224" ry="224" fill="#6366f1"/>

  <g fill="#ffffff">
    <!-- M (200 x 280) -->
    <g transform="translate(240.75 322) scale(1.3571)">
      <path d="M0,280 V0 H50 L100,130 L150,0 H200 V280 H150 V90 L115,200 H85 L50,90 V280 Z"/>
    </g>
    <!-- Downward arrow (200 x 360), placed to the right of the M -->
    <g transform="translate(572.15 322) scale(1.0556)">
      <path d="M60,0 H140 V170 H200 L100,360 L0,170 H60 Z"/>
    </g>
  </g>
</svg>
