version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      react:
        patterns:
          - 'react'
          - 'react-dom'
          - '@types/react'
          - '@types/react-dom'
      codemirror:
        patterns:
          - '@codemirror/*'
          - 'codemirror'
      tauri:
        patterns:
          - '@tauri-apps/*'

  - package-ecosystem: cargo
    directory: /src-tauri
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      tauri:
        patterns:
          - 'tauri'
          - 'tauri-*'
          - 'tauri-plugin-*'

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
