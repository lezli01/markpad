name: Feature or spec request
description: Propose a small, reviewable feature or behavior change.
title: "feat: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: "Features should start with a clear problem, acceptance criteria, and a small implementation shape."
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user problem should this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What should change?
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: What must be true for this to be done?
      placeholder: |
        - [ ] ...
        - [ ] ...
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Optional. What other approaches did you consider?
  - type: checkboxes
    id: scope
    attributes:
      label: Scope check
      options:
        - label: This is small enough for one focused pull request.
        - label: This avoids new dependencies, or the dependency need is explained above.

