name: Dependency review

on:
  pull_request:
    branches: [master]

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    name: Review dependency changes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          fail-on-severity: moderate
          comment-summary-in-pr: on-failure
          # GHSA-wrw7-89jp-8q8g: glib 0.18.5 VariantStrIter unsoundness. Fixed
          # in glib 0.20, but pulled in transitively via tauri -> gtk 0.18 ->
          # glib 0.18. The gtk-rs 0.20 migration hasn't reached the webkit2gtk
          # crate yet, so no direct upgrade path. Revisit when Tauri bumps gtk-rs.
          allow-ghsas: GHSA-wrw7-89jp-8q8g
